# 方块->颜色 覆盖（一个方块可拥有多种颜色，玩家有其中任意一种即可交互）
# 颜色名：RED BROWN ORANGE YELLOW GREEN BLUE PURPLE PINK BLACK GRAY WHITE
# value 可写单个颜色，或用列表/逗号分隔的多个颜色，例如：
# block-colors:
#   GRASS_BLOCK: [GREEN, BROWN]
#   BIRCH_LOG: "YELLOW, WHITE"
#   STONE: GRAY
block-colors: {}
