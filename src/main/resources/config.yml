# FreshwaterColorSurvival 配置
# 作者：淡水岛开发组

# 是否在违规时显示 action bar 提示
show-action-bar: true

# 是否显示侧边栏记分板（管理员也可用 /fwc config sidebar <true/false> 切换），默认开启
sidebar-enabled: true

# 功能方块（工作台/熔炉/箱子等）是否豁免颜色限制（所有人都能使用）
utility-exempt: true

# 额外豁免的方块（即使颜色不符也允许破坏/放置/使用）。填写 Material 名称（大写）
exempt-materials:
  - CRAFTING_TABLE
  - FURNACE
  - BLAST_FURNACE
  - SMOKER
  - CHEST
  - TRAPPED_CHEST
  - BARREL
  - ENDER_CHEST
  - SMITHING_TABLE
  - STONECUTTER
  - GRINDSTONE
  - LOOM
  - CARTOGRAPHY_TABLE
  - ENCHANTING_TABLE
  - ANVIL
  - CHIPPED_ANVIL
  - DAMAGED_ANVIL
  - BREWING_STAND
  - CAULDRON
  - BEACON
  - BELL
  - RESPAWN_ANCHOR

# 两阶段惩罚
punishment:
  # 对局开始后多少分钟自动开启惩罚阶段
  auto-enable-after-minutes: 15
  # 惩罚扣除的血量（2.0 = 1 颗心）
  damage: 2.0
  # 是否随机清除背包中的一个物品
  clear-random-item: true
  # 每名玩家触发惩罚的冷却（秒），避免连点瞬间清空背包
  cooldown-seconds: 3

# 提示消息（支持 & 颜色代码；%color% 会替换为该方块可交互的颜色 ■）
messages:
  prefix: "&b[颜色生存]&r "
  no-permission: "&c你没有权限执行此操作。"
  not-in-game: "&c当前没有进行中的对局。"
  break-deny: "&c无法破坏！可交互颜色: %color%"
  place-deny: "&c无法放置！可交互颜色: %color%"
  use-deny: "&c无法使用！可交互颜色: %color%"
  pickup-deny: "&c无法拾取！可交互颜色: %color%"

# bingo 物品池（从中随机抽取 25 个生成卡片）。填写 Material 名称（大写）
bingo-items:
  - DIAMOND
  - IRON_INGOT
  - GOLD_INGOT
  - COPPER_INGOT
  - EMERALD
  - LAPIS_LAZULI
  - REDSTONE
