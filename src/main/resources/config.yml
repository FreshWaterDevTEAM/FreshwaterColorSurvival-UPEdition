# FreshwaterColorSurvival 配置
# 作者：淡水岛开发组

# 是否在违规时显示 action bar 提示
show-action-bar: true

# 功能方块（工作台/熔炉/箱子等）是否豁免颜色限制（所有人都能使用）
utility-exempt: true

# 额外豁免的方块（即使颜色不符也允许破坏/放置/使用）。填写 Material 名称（大写）
exempt-materials:
  - CRAFTING_TABLE
  - FURNACE
  - BLAST_FURNACE
  - SMOKER
  - CHEST
  - TRAPPED_CHEST
  - BARREL
  - ENDER_CHEST
  - SMITHING_TABLE
  - STONECUTTER
  - GRINDSTONE
  - LOOM
  - CARTOGRAPHY_TABLE
  - ENCHANTING_TABLE
  - ANVIL
  - CHIPPED_ANVIL
  - DAMAGED_ANVIL
  - BREWING_STAND
  - CAULDRON
  - BEACON
  - BELL
  - RESPAWN_ANCHOR

# 两阶段惩罚
punishment:
  # 对局开始后多少分钟自动开启惩罚阶段
  auto-enable-after-minutes: 15
  # 惩罚扣除的血量（2.0 = 1 颗心）
  damage: 2.0
  # 是否随机清除背包中的一个物品
  clear-random-item: true
  # 每名玩家触发惩罚的冷却（秒），避免连点瞬间清空背包
  cooldown-seconds: 3

# 提示消息（支持 & 颜色代码）
messages:
  prefix: "&b[颜色生存]&r "
  no-permission: "&c你没有权限执行此操作。"
  not-in-game: "&c当前没有进行中的对局。"
  break-deny: "&c这是 %color% 的方块，你不能破坏它！"
  place-deny: "&c你只能放置 %color% 的方块！"
  use-deny: "&c这是 %color% 的方块，你不能使用它！"

# bingo 物品池（从中随机抽取 25 个生成卡片）。填写 Material 名称（大写）
