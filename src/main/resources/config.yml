  - COOKED_PORKCHOP
  - COOKED_CHICKEN
  - COOKED_COD
  - EGG
  - MILK_BUCKET
  - SUGAR_CANE
  - BAMBOO
  - OAK_LOG
  - BIRCH_LOG
  - SPRUCE_LOG
  - OAK_PLANKS
  - COBBLESTONE
  - STONE
  - SAND
  - GRAVEL
